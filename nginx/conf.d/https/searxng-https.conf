# Nginx HTTPS 反向代理配置 (配合 docker-compose.https.yml)
#
# 此配置同时监听 80 (HTTP -> HTTPS 重定向) 和 443 (HTTPS)
# Basic Auth 保护整个 SearXNG 站点

# ============================================================
# HTTP -> HTTPS 重定向
# ============================================================
server {
    listen 80;
    server_name _;

    # ACME 挑战路径 (用于 Let's Encrypt 证书验证)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他所有请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# HTTPS 主服务器
# ============================================================
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # ============================================================
    # SSL / TLS 证书
    # ============================================================
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # ============================================================
    # TLS 安全配置 (推荐设置)
    # ============================================================
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (取消注释以启用, 注意: 一旦启用浏览器会强制 HTTPS)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # ============================================================
    # Basic Authentication
    # ============================================================
    auth_basic "SearXNG - Restricted Access";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # ============================================================
    # 安全头
    # ============================================================
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    # ============================================================
    # SearXNG 反向代理
    # ============================================================
    location / {
        proxy_pass http://searxng:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        # 增大 buffer 防止 SearXNG 返回 header 过大 (cookie 列表)
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 64k;

        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ============================================================
    # 速率限制: 每个 IP 每秒最多 10 个搜索请求
    # (limit_req_zone 定义在 nginx.conf 的 http 块中)
    # ============================================================
    location /search {
        limit_req zone=search_limit burst=20 nodelay;
        proxy_pass http://searxng:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
