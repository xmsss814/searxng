# Nginx HTTP 反向代理配置 (配合 docker-compose.yml)
#
# 此文件在 docker compose up 时自动挂载到 Nginx 容器
# Basic Auth 保护整个 SearXNG 站点

server {
    listen 80;
    server_name _;

    # ============================================================
    # Basic Authentication
    # ============================================================
    auth_basic "SearXNG - Restricted Access";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # ============================================================
    # 安全头
    # ============================================================
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    # ============================================================
    # SearXNG 反向代理
    # ============================================================
    location / {
        proxy_pass http://searxng:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # 增大 buffer 防止 SearXNG 返回 header 过大 (cookie 列表)
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 64k;

        # WebSocket 支持 (如果启用)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ============================================================
    # SearXNG MCP Server (Streamable HTTP)
    # 暴露 /mcp 路径给 Claude Code / Desktop, 继承上面的 Basic Auth
    # /mcp/mcp 为 FastMCP 默认挂载路径
    # ============================================================
    location /mcp {
        proxy_pass http://searxng-mcp:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamable HTTP 同时使用 POST (JSON-RPC) 和 GET (SSE)
        # 必须 HTTP/1.1 + Connection 保持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 流式响应: 关闭缓冲, 禁用超短超时
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ============================================================
    # 速率限制: 每个 IP 每秒最多 10 个搜索请求
    # (limit_req_zone 在 nginx.conf 的 http 块中定义)
    # ============================================================
    location /search {
        limit_req zone=search_limit burst=20 nodelay;
        proxy_pass http://searxng:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 速率限制区域定义 (在 nginx.conf http 块中定义)
    # 注意: 如果速率限制报错, 注释掉下面的 limit_req 行即可
}
