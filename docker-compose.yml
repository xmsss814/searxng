# docker-compose.yml
# ============================
# SeaxrXNG Docker Compose 部署文件
# 使用 Basic Auth 进行访问限制
#
# 使用方法:
#   1. 编辑 .env 文件设置用户名和密码
#   2. 运行: docker compose up -d
#
# ============================

services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL:-http://localhost:9080}
    # 允许容器内通过 host.docker.internal 访问宿主机 (例如使用宿主机的代理)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "2"
    networks:
      - searxng-net

  # ============================================================
  # SearXNG MCP Server
  # 通过 Streamable HTTP 暴露 MCP 工具 (searxng_search/config/autocomplete)
  # 走 docker network 直连 searxng:8080, 不需要 Basic Auth
  # 通过 Nginx 的 /mcp 路径对外暴露, 复用 Basic Auth
  # ============================================================
  searxng-mcp:
    build: ./mcp-server
    image: searxng-mcp:latest
    container_name: searxng-mcp
    restart: unless-stopped
    environment:
      - SEARXNG_INTERNAL_URL=http://searxng:8080
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
    depends_on:
      - searxng
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "2"
    networks:
      - searxng-net

  nginx:
    image: nginx:alpine
    container_name: searxng-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-9080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/http:/etc/nginx/conf.d:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - searxng
      - searxng-mcp
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "2"
    networks:
      - searxng-net

networks:
  searxng-net:
    driver: bridge
